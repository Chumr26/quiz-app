<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Trọn bộ câu hỏi ôn tập Giáo dục Chính trị K26 - Bài trắc nghiệm tương tác">
  <title>Ôn tập Giáo dục Chính trị</title>

  <!-- Favicon -->
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#131314">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Styles loaded via JS module import so Vite's dev server serves CSS correctly -->
</head>
<body>

  <div class="quiz-container" id="quiz-app">
    <!-- Skeleton shown until QuizApp.render() replaces it with the picker. -->
    <div class="quiz-header">
      <div class="header-top">
        <span class="quiz-title">Ôn tập Giáo dục Chính trị</span>
      </div>
      <p class="part-picker-subtitle">&nbsp;</p>
    </div>
    <div class="quiz-content">
      <div class="part-picker">
        <div class="skeleton-card" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <!-- Quiz Engine -->
  <script type="module" src="script.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
          .catch(err => console.error('[PWA] SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
